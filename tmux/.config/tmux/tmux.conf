# ============================================================================
# Prefix: Ctrl-Space
# ============================================================================
unbind C-b
set-option -g prefix C-Space
bind-key C-Space last-window
bind r source-file ~/.config/tmux/tmux.conf\; display "Reloaded!"

# ============================================================================
# Core — tuned for Claude Code & general TUI work
# ============================================================================
set-environment -g PATH "/opt/homebrew/bin:/usr/local/bin:/bin:/usr/bin:/usr/sbin:/sbin"
set  -g  mouse on
set  -g  history-limit 100000
set  -sg escape-time 10
set  -g  focus-events on
set  -g  default-terminal "tmux-256color"
set  -ga terminal-overrides ",xterm-256color:RGB"
set  -g  base-index 1
setw -g  pane-base-index 1
set  -g  renumber-windows on

# ============================================================================
# Catppuccin — palette only (we override the status bar below)
# ============================================================================
set -g @catppuccin_flavor "macchiato"
run ~/.config/tmux/plugins/tmux/catppuccin.tmux

# ============================================================================
# Minimal status bar — no global colorization, just per-window accents
# ============================================================================
set -g status-position top
set -g status-justify  left
set -g status-style    "bg=default,fg=#6e738d"
set -g status-left     ""
set -g status-right    ""
set -g status-left-length  100
set -g status-right-length 100
set -g window-status-separator "  "

# Per-window color: rotate through the catppuccin macchiato palette by window
# index (last digit). Inactive shows dim name; active is bold + bright name.
set -g window-status-format         "#[fg=#{?#{m/r:1$,#I},#8aadf4,#{?#{m/r:2$,#I},#a6da95,#{?#{m/r:3$,#I},#eed49f,#{?#{m/r:4$,#I},#f5a97f,#{?#{m/r:5$,#I},#ed8796,#{?#{m/r:6$,#I},#c6a0f6,#{?#{m/r:7$,#I},#7dc4e4,#{?#{m/r:8$,#I},#f0c6c6,#{?#{m/r:9$,#I},#8bd5ca,#cad3f5}}}}}}}}}]#I #[fg=#6e738d]#W"
set -g window-status-current-format "#[fg=#{?#{m/r:1$,#I},#8aadf4,#{?#{m/r:2$,#I},#a6da95,#{?#{m/r:3$,#I},#eed49f,#{?#{m/r:4$,#I},#f5a97f,#{?#{m/r:5$,#I},#ed8796,#{?#{m/r:6$,#I},#c6a0f6,#{?#{m/r:7$,#I},#7dc4e4,#{?#{m/r:8$,#I},#f0c6c6,#{?#{m/r:9$,#I},#8bd5ca,#cad3f5}}}}}}}}},bold]#I #[fg=#cad3f5,bold]#W"

# Plain pane borders & messages — no chrome, no accent colors
set -g pane-border-style        "fg=#494d64"
set -g pane-active-border-style "fg=#6e738d"
set -g message-style            "bg=default,fg=#cad3f5"
set -g message-command-style    "bg=default,fg=#cad3f5"
set -g mode-style               "bg=#363a4f,fg=#cad3f5"

# ============================================================================
# Menus
# ============================================================================
set -g @menus_trigger 'Space'

# ============================================================================
# vim-like pane resize & switch
# ============================================================================
bind -r C-k resize-pane -U
bind -r C-j resize-pane -D
bind -r C-h resize-pane -L
bind -r C-l resize-pane -R

bind -r k select-pane -U
bind -r j select-pane -D
bind -r h select-pane -L
bind -r l select-pane -R

unbind Up
unbind Down
unbind Left
unbind Right
unbind C-Up
unbind C-Down
unbind C-Left
unbind C-Right

# ============================================================================
# Plugins
# ============================================================================
set -g @plugin 'catppuccin/tmux'
set -g @plugin 'tmux-plugins/tmux-yank'
set -g @plugin 'tmux-plugins/tmux-cowboy'
set -g @plugin 'jaclu/tmux-menus'
set -g @plugin 'tmux-plugins/tmux-sensible'
set -g @plugin 'tmux-plugins/tpm'

# Keep this at the very bottom
run '~/.config/tmux/plugins/tpm/tpm'
